<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>금형 수리관리 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f6fa;--surface:#ffffff;--border:#e0e3eb;--card:#f0f2f7;--text:#1a1a2e;--muted:#6b7280;--dim:#9ca3af;--blue:#2563eb;--blue-light:#3b82f6;--orange:#ea580c;--purple:#7c3aed;--green:#16a34a;--red:#dc2626;--yellow:#eab308;--teal:#0d9488}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
input,select,textarea,button{font-family:inherit}
.header{background:linear-gradient(135deg,#1e3a5f,#2563eb);border-bottom:1px solid var(--border);padding:16px 28px;display:flex;justify-content:space-between;align-items:center}
.logo{display:flex;align-items:center;gap:14}
.logo-icon{width:36px;height:36px;background:#fff;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#2563eb}
.logo-title{font-size:17px;font-weight:800;letter-spacing:-0.5px;color:#fff}
.logo-sub{font-size:11px;color:rgba(255,255,255,.6)}
.header-actions{display:flex;gap:12px;align-items:center}
.alert-badge{background:var(--red);color:#fff;border-radius:50%;width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.alert-text{font-size:12px;color:#fff;margin-left:6px;font-weight:600}
.db-status{font-size:11px;padding:4px 10px;border-radius:10px;font-weight:600}
.db-online{background:#dcfce7;color:var(--green)}
.db-offline{background:#fee2e2;color:var(--red)}
.db-loading{background:#ffedd5;color:var(--orange)}
.btn{padding:9px 22px;border:none;border-radius:4px;cursor:pointer;font-weight:600;font-size:13px;color:#fff;transition:opacity .2s}
.btn:hover{opacity:.85}
.btn-primary{background:var(--blue)}
.btn-secondary{background:#6b7280}
.btn-teal{background:var(--teal)}
.btn-green{background:var(--green)}
.btn-red{background:var(--red)}
.btn-purple{background:var(--purple)}
.btn-sm{padding:5px 14px;font-size:12px}
.tabs{padding:0 28px;background:#ffffff;border-bottom:1px solid var(--border);display:flex;overflow-x:auto}
.tab{padding:10px 20px;cursor:pointer;font-weight:600;font-size:13px;border:none;background:transparent;color:var(--muted);border-radius:4px 4px 0 0;transition:all .2s;white-space:nowrap}
.tab.active{background:var(--blue);color:#fff}
.tab:hover:not(.active){color:var(--text);background:#f0f2f7}
.content{padding:28px}
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;border-left:3px solid var(--blue)}
.kpi-label{font-size:12px;color:var(--muted);margin-bottom:8px}
.kpi-value{font-size:28px;font-weight:800}
.kpi-unit{font-size:14px;color:var(--dim);margin-left:4px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px}
.panel-title{margin:0 0 16px;font-size:14px;color:var(--muted);font-weight:600}
.bar-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.bar-label{width:80px;font-size:12px;color:var(--muted);text-align:right;flex-shrink:0}
.bar-track{flex:1;height:24px;background:var(--card);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:8px;font-size:12px;font-weight:700;color:#fff;transition:width .5s}
.alert-item{padding:8px 0;border-bottom:1px solid #f0f1f3;font-size:13px;display:flex;align-items:center;gap:8px;cursor:pointer}
.alert-item:hover{color:var(--blue)}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.filters{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.input{padding:8px 10px;background:#fff;border:1px solid #d1d5db;border-radius:4px;color:var(--text);font-size:13px}
select.input{appearance:auto}
.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:8px}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{background:#f8f9fb}
th{padding:10px 12px;text-align:left;color:var(--muted);font-weight:600;font-size:11px;border-bottom:2px solid var(--border);white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid #f0f1f3}
tr.row:hover{background:#eef2ff!important}
tr.row{cursor:pointer;transition:background .15s}
.badge{color:#fff;padding:3px 10px;border-radius:3px;font-size:12px;font-weight:600;letter-spacing:.5px;display:inline-block}
.code-link{font-weight:600;color:var(--blue)}
.shot-bar{display:flex;align-items:center;gap:8px}
.shot-track{width:80px;height:8px;background:#e5e7eb;border-radius:4px;overflow:hidden}
.shot-fill{height:100%;border-radius:4px;transition:width .5s}
.shot-text{font-size:11px;color:var(--muted)}
.ellipsis{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:1000;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border:1px solid var(--border);border-radius:12px;width:800px;max-height:88vh;overflow-y:auto;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-header{display:flex;justify-content:space-between;margin-bottom:20px}
.modal-header h3{font-size:18px;font-weight:700}
.modal-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer}
.stage-progress{display:flex;align-items:center;margin-bottom:24px;background:var(--card);border-radius:6px;padding:14px 16px}
.stage-step{flex:1;display:flex;align-items:center}
.stage-node{display:flex;flex-direction:column;align-items:center;flex:1}
.stage-circle{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff}
.stage-name{font-size:10px;margin-top:4px}
.stage-line{width:30px;height:2px}
.info-box{background:var(--card);border-radius:6px;padding:14px;font-size:13px;line-height:2}
.info-box b{color:var(--text)}
.section-title{color:var(--muted);font-size:12px;margin:16px 0 10px;font-weight:600}
.stat-line{font-size:13px;color:var(--muted);line-height:2}
.stat-line b{color:var(--text)}
.alert-full{padding:12px 16px;border-bottom:1px solid #f0f1f3;display:flex;align-items:center;gap:12px;cursor:pointer;font-size:13px}
.alert-full:hover{background:#f0f2f7}
.alert-arrow{margin-left:auto;font-size:11px;color:var(--dim)}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:600}
.field input,.field select,.field textarea{width:100%;padding:8px 10px;background:#fff;border:1px solid #d1d5db;border-radius:4px;color:var(--text);font-size:13px}
.field textarea{resize:vertical;height:70px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.form-actions{margin-top:20px;display:flex;gap:10px;justify-content:flex-end}
.photo-zone{border:2px dashed #d1d5db;border-radius:8px;padding:16px;text-align:center;cursor:pointer;transition:border-color .2s;min-height:160px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;background:#fafbfc}
.photo-zone:hover{border-color:var(--blue)}
.photo-zone img{max-width:100%;max-height:200px;border-radius:6px;margin-top:8px}
.photo-zone .ph-label{font-size:13px;color:var(--muted);margin-bottom:4px}
.photo-zone .ph-hint{font-size:11px;color:var(--dim)}
.photo-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.photo-remove{position:absolute;top:6px;right:6px;background:var(--red);color:#fff;border:none;border-radius:50%;width:22px;height:22px;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:1}
.photo-compare{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.photo-compare img{width:100%;border-radius:6px;border:1px solid var(--border)}
.mold-status{padding:2px 8px;border-radius:3px;font-size:11px;font-weight:600}
.mold-active{background:#dcfce7;color:var(--green)}
.mold-inactive{background:#fee2e2;color:var(--red)}
.mold-maintenance{background:#ffedd5;color:var(--orange)}
.mold-new{background:#ccfbf1;color:var(--teal)}
.count-badge{background:var(--card);color:var(--muted);padding:2px 8px;border-radius:10px;font-size:11px;margin-left:6px}
.history-item{display:flex;gap:12px;align-items:center;margin-bottom:8px;font-size:13px}
.export-btn{background:#fff;border:1px solid #d1d5db;color:var(--muted);padding:6px 14px;border-radius:4px;cursor:pointer;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:4px}
.export-btn:hover{color:var(--text);border-color:var(--blue);background:#eef2ff}
.settings-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.setting-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px}
.setting-card-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
.setting-card-desc{font-size:11px;color:var(--dim);margin-bottom:14px}
.setting-item{display:flex;align-items:center;gap:8px;padding:7px 10px;background:#f8f9fb;border:1px solid #eee;border-radius:4px;margin-bottom:6px;font-size:13px}
.setting-item:hover{background:#eef2ff}
.setting-btn{background:none;border:none;cursor:pointer;font-size:12px;padding:2px 6px;border-radius:3px}
.setting-btn:hover{background:#e5e7eb}
.setting-btn-add{display:flex;align-items:center;gap:4px;padding:6px 12px;background:#f8f9fb;border:1px dashed #d1d5db;border-radius:4px;color:var(--muted);font-size:12px;cursor:pointer;width:100%;justify-content:center;margin-top:6px}
.setting-btn-add:hover{border-color:var(--teal);color:var(--teal)}
.setting-count{font-size:11px;color:var(--dim);font-weight:400}
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:6px;font-size:13px;font-weight:600;z-index:2000;animation:slideIn .3s;color:#fff}
.toast-success{background:var(--green)}
.toast-error{background:var(--red)}
.toast-info{background:var(--blue)}
@keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,.95);z-index:3000;display:flex;flex-direction:column;align-items:center;justify-content:center}
.spinner{width:40px;height:40px;border:3px solid #e5e7eb;border-top:3px solid var(--blue);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:16px}
@keyframes spin{to{transform:rotate(360deg)}}
.preview-table{max-height:300px;overflow:auto;margin:16px 0;border:1px solid var(--border);border-radius:6px}
.preview-table table{font-size:12px}
.preview-table th{position:sticky;top:0;background:#f8f9fb;z-index:1}
.import-summary{background:#eef2ff;border:1px solid #c7d2fe;border-radius:6px;padding:14px;font-size:13px;margin:12px 0}
.import-summary .num{color:var(--blue);font-weight:800;font-size:18px}
.dup-warn{background:#fef3c7;border:1px solid #fbbf24;border-radius:6px;padding:10px 14px;font-size:12px;color:#92400e;margin:10px 0}
.search-bar{display:flex;gap:10px;padding:16px;background:#fff;border:1px solid var(--border);border-radius:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.search-bar input,.search-bar select{padding:8px 12px;border:1px solid #d1d5db;border-radius:4px;font-size:13px;color:var(--text)}
.search-btn{padding:8px 20px;background:var(--blue);color:#fff;border:none;border-radius:4px;font-weight:600;font-size:13px;cursor:pointer}
.search-btn:hover{opacity:.85}
.alert-card{padding:12px 16px;border-radius:8px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;font-size:13px;border:1px solid}
.alert-card.repair{background:#fef2f2;border-color:#fecaca;color:#991b1b}
.alert-card.shot{background:#fef3c7;border-color:#fde68a;color:#92400e}
.alert-card.delay{background:#fff7ed;border-color:#fed7aa;color:#9a3412}
@media(max-width:900px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.grid-2,.photo-compare{grid-template-columns:1fr}.modal{width:95%;padding:20px}.settings-grid{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.kpi-grid{grid-template-columns:1fr}.filters{flex-direction:column}.header{flex-direction:column;gap:12px}.settings-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div id="loadingScreen" class="loading-overlay">
  <div class="spinner"></div>
  <div style="color:var(--muted);font-size:14px">데이터베이스 연결 중...</div>
</div>

<div class="header">
  <div class="logo">
    <div class="logo-icon">M</div>
    <div>
      <div class="logo-title">금형 수리관리 시스템</div>
      <div class="logo-sub">Mold Repair Management System v5.0</div>
    </div>
  </div>
  <div class="header-actions">
    <span id="dbStatus" class="db-status db-loading">⏳ 연결중</span>
    <div id="alertBadgeArea"></div>

  </div>
</div>

<div class="tabs">
  <button class="tab active" data-tab="dashboard" onclick="switchTab('dashboard',this)">대시보드</button>
  <button class="tab" style="background:var(--blue);color:#fff;font-weight:700" onclick="openNewRepairForm()">+ 수리의뢰</button>
  <button class="tab" data-tab="molddb" onclick="switchTab('molddb',this)">금형 DB</button>
  <button class="tab" data-tab="list" onclick="switchTab('list',this)">수리내역</button>
  <button class="tab" data-tab="stats" onclick="switchTab('stats',this)">통계분석</button>
  <button class="tab" data-tab="alerts" onclick="switchTab('alerts',this)">알림 <span id="alertTabCount"></span></button>
  <button class="tab" data-tab="settings" onclick="switchTab('settings',this)">⚙ 설정</button>
</div>

<div class="content">
  <div id="view-dashboard"></div>
  <div id="view-molddb" style="display:none"></div>
  <div id="view-list" style="display:none"></div>
  <div id="view-stats" style="display:none"></div>
  <div id="view-alerts" style="display:none"></div>
  <div id="view-settings" style="display:none"></div>
</div>

<div id="modalOverlay" class="overlay" style="display:none" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header"><h3 id="modalTitle"></h3><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div id="modalBody"></div>
  </div>
</div>

<input type="file" id="moldExcelInput" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleMoldExcel(this)">
<input type="file" id="repairExcelInput" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleRepairExcel(this)">
<input type="file" id="shotUpdateInput" accept=".xlsx,.xls,.csv" style="display:none" onchange="handleShotUpdate(this)">

<script>
// ==================== SUPABASE 연결 ====================
const SUPABASE_URL='https://ebthltdmxpzlkfwvdloz.supabase.co';
const SUPABASE_KEY='sb_publishable_ZSgcZapb7cTgFezGmOV_ow_9MT15SnS';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

// ==================== DATA ====================
const STAGES=["의뢰접수","작업중","측정검증","입고완료"];
const STAGE_COLORS={"의뢰접수":"#e67e22","작업중":"#3498db","측정검증":"#9b59b6","입고완료":"#27ae60"};

let moldDB=[];
let repairData=[];
let repairHistory={};
const SETTINGS_VERSION='v5.3'; // Change this to force-sync settings to DB

const DEFAULT_SETTINGS={
  historyTypes:{name:"이력관리 데이터종류",desc:"이력관리 조회 항목",items:["🔧 수리이력","📦 금형현황"]},
  moldGroups:{name:"금형그룹 (톤수)",desc:"금형 톤수 분류",items:["100톤","150톤","200톤","250톤","300톤","800톤"]},
  repairTypes:{name:"수리유형",desc:"수리 종류 분류",items:["부품교체","정밀보전","라이너조정","연마","용접","기타"]},
  moldStatuses:{name:"금형상태",desc:"금형 가동 상태 구분",items:["가동중","보전중","폐기대기","신규"]},
  customers:{name:"고객사",desc:"거래처 / 납품처",items:["현대","기아","GM","FORD"]},
  locations:{name:"위치 / 라인",desc:"금형 설치 위치",items:["A-1라인","A-2라인","A-3라인","B-1라인","B-2라인","C-1라인","C-2라인","D-1라인","D-2라인","창고"]},
  requesters:{name:"의뢰자",desc:"수리 의뢰 담당자",items:["유성환","왕석주","정주은","최민호","강영태","하경자","한영숙","고성신","정승옥","김태주","윤소미","최두연","황복연","박종식","황덕순","구진석","서희정","진민성","황문강","김고은"]},
  assignees:{name:"수리담당자",desc:"금형 수리 작업자",items:["박영희","김대현","이승준","최민수","임혜종","왕석주","강영태","여혜빈","김동현"]},
  repairReasons:{name:"수리사유 (자주 사용)",desc:"빠른 입력용",items:["내경치수 NG","외경치수 NG","BURR 발생","기즈 발생","라이너 조정","펀치 마모","다이 마모","높이치수 NG","직각도 NG","평행도 NG"]}
};

let settingsData=JSON.parse(JSON.stringify(DEFAULT_SETTINGS));

let currentTab="dashboard";
let filterStage="전체",filterGroup="전체",filterSearch="";
let moldFilterStatus="전체",moldFilterGroup="전체",moldFilterSearch="";

// 검색 디바운스 (입력 멈춘 후 300ms 후 렌더링)
let _searchTimer=null;
function debounceRender(val,target){
  if(target==='mold')moldFilterSearch=val;
  else filterSearch=val;
  clearTimeout(_searchTimer);
  _searchTimer=setTimeout(()=>render(),300);
}

function S(key){return settingsData[key]?settingsData[key].items:[]}
function getMoldGroups(){return S('moldGroups')}
function getRepairTypes(){return S('repairTypes')}
function getMoldStatuses(){return S('moldStatuses')}
function getCustomers(){return S('customers')}
function getLocations(){return S('locations')}
function getRequesters(){return S('requesters')}
function getAssignees(){return S('assignees')}

// ==================== SUPABASE CRUD ====================
function toast(msg,type='info'){
  const el=document.createElement('div');el.className=`toast toast-${type}`;el.textContent=msg;
  document.body.appendChild(el);setTimeout(()=>el.remove(),3000);
}

async function dbLoad(){
  try{
    document.getElementById('dbStatus').className='db-status db-loading';
    document.getElementById('dbStatus').textContent='⏳ 로딩중';

    // Load mold_db
    const{data:molds,error:e1}=await sb.from('mold_db').select('*').order('id');
    if(e1)throw e1;
    moldDB=molds||[];

    // Load repair_data
    const{data:repairs,error:e2}=await sb.from('repair_data').select('*').order('id');
    if(e2)throw e2;
    repairData=repairs||[];

    // Load repair_history
    const{data:hist,error:e3}=await sb.from('repair_history').select('*').order('id');
    if(e3)throw e3;
    repairHistory={};
    (hist||[]).forEach(h=>{if(!repairHistory[h.repair_id])repairHistory[h.repair_id]=[];repairHistory[h.repair_id].push(h)});

    // Load settings
    const{data:sets,error:e4}=await sb.from('settings').select('*');
    if(e4)throw e4;
    if(sets&&sets.length){
      sets.forEach(s=>{settingsData[s.category]={name:s.name||s.category,desc:s.description||'',items:s.items||[]}});
    }else{
      // First time: save default settings
      await saveAllSettings();
    }

    document.getElementById('dbStatus').className='db-status db-online';

async function dbAdvanceStage(repairId,newStage){

// ==================== UI HELPERS ====================
function getMold(code){return moldDB.find(m=>m.mold_code===code)}
function getRepairsForMold(code){return repairData.filter(r=>r.mold_code===code)}
function getHistory(repairId){return repairHistory[repairId]||[]}
function badge(stage){return `<span class="badge" style="background:${STAGE_COLORS[stage]||'#555'}">${stage}</span>`}
function statusBadge(s){const cls=s==="가동중"?"mold-active":s==="보전중"?"mold-maintenance":s==="신규"?"mold-new":"mold-inactive";return `<span class="mold-status ${cls}">${s}</span>`}
function shotBar(cur,max){const pct=Math.min((cur||0)/(max||1)*100,100);const c=pct>80?"var(--red)":pct>60?"var(--orange)":"var(--green)";return `<div class="shot-bar"><div class="shot-track"><div class="shot-fill" style="width:${pct}%;background:${c}"></div></div><span class="shot-text">${((cur||0)/1000).toFixed(0)}k/${((max||300000)/1000).toFixed(0)}k</span></div>`}
function fmtDate(v){if(!v)return"";if(typeof v==='number'){const d=new Date((v-25569)*86400000);return d.toISOString().slice(0,10)}return String(v).slice(0,10)}

function getAlerts(){
  const alerts=[];
  // 모든 진행중 수리건 (입고완료 전까지 알림 유지)
  repairData.forEach(r=>{
    if(r.stage==="입고완료")return;
    const hist=getHistory(r.id);
    const last=hist.length?hist[hist.length-1]:null;
    const days=last?Math.floor((Date.now()-new Date(last.action_date))/86400000):0;
    const m=getMold(r.mold_code);
    const moldName=m?m.mold_name||'':'';
    if(days>5){
      alerts.push({type:"delay",msg:`⏰ ${r.mold_code}(${moldName}) ${r.stage} - ${days}일 경과 (장기 미처리)`,id:r.id,kind:"repair",stage:r.stage,days:days});
    }else{
      alerts.push({type:"repair",msg:`🔧 ${r.mold_code}(${moldName}) - ${r.stage} | ${r.reason||''}`,id:r.id,kind:"repair",stage:r.stage,days:days});
    }
  });
  return alerts;
}

function getStats(){
  const byStage=STAGES.map(s=>({stage:s,count:repairData.filter(i=>i.stage===s).length}));
  const totalCost=repairData.reduce((a,b)=>a+(b.cost||0),0);
  const completed=repairData.filter(i=>i.stage==="입고완료");
  let avgLead=0;
  if(completed.length){
    let validTimes=[];
    completed.forEach(r=>{const h=getHistory(r.id);if(h.length>=2){const t=(new Date(h[h.length-1].action_date)-new Date(h[0].action_date))/86400000;validTimes.push(t)}});
    if(validTimes.length)avgLead=(validTimes.reduce((a,b)=>a+b,0)/validTimes.length).toFixed(1);
  }
  const mc={};repairData.forEach(i=>{mc[i.mold_code]=(mc[i.mold_code]||0)+1});
  const topMolds=Object.entries(mc).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const tc={};repairData.forEach(i=>{tc[i.repair_type]=(tc[i.repair_type]||0)+1});
  const byType=Object.entries(tc).sort((a,b)=>b[1]-a[1]);
  return{byStage,totalCost,avgLead,topMolds,byType,total:repairData.length,moldTotal:moldDB.length,moldActive:moldDB.filter(m=>m.status==="가동중").length};
}

function switchTab(tab,el){
  currentTab=tab;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  if(el)el.classList.add('active');
  ["dashboard","molddb","list","stats","alerts","settings"].forEach(v=>{document.getElementById("view-"+v).style.display=v===tab?"":"none"});
  render();
}

function closeModal(){document.getElementById("modalOverlay").style.display="none"}

// ==================== RENDER ====================
function render(){
  const alerts=getAlerts();const stats=getStats();
  document.getElementById("alertBadgeArea").innerHTML=alerts.length?`<span class="alert-badge">${alerts.length}</span><span class="alert-text">알림</span>`:"";
  document.getElementById("alertTabCount").textContent=`(${alerts.length})`;
  if(currentTab==="dashboard")renderDashboard(stats,alerts);
  if(currentTab==="molddb")renderMoldDB();
  if(currentTab==="list")renderList();
  if(currentTab==="stats")renderStats(stats);
  if(currentTab==="alerts")renderAlerts(alerts);

}

function renderDashboard(stats,alerts){
  const inProgress=stats.byStage.filter(s=>s.stage!=="입고완료").reduce((a,b)=>a+b.count,0);
  const barMax=Math.max(...stats.byStage.map(s=>s.count),1);
  let h=`<div class="kpi-grid">`;
  [{l:"등록 금형",v:stats.moldTotal,u:"종",c:"var(--teal)"},{l:"가동중",v:stats.moldActive,u:"종",c:"var(--green)"},{l:"수리 진행중",v:inProgress,u:"건",c:"var(--orange)"},{l:"총 수리비용",v:(stats.totalCost/10000).toFixed(0),u:"만원",c:"var(--blue)"}].forEach(k=>{
    h+=`<div class="kpi-card" style="border-left-color:${k.c}"><div class="kpi-label">${k.l}</div><div class="kpi-value" style="color:${k.c}">${k.v}<span class="kpi-unit">${k.u}</span></div></div>`;
  });
  h+=`</div><div class="grid-2"><div class="panel"><div class="panel-title">단계별 현황</div>`;
  stats.byStage.forEach(s=>{h+=`<div class="bar-row"><span class="bar-label">${s.stage}</span><div class="bar-track"><div class="bar-fill" style="width:${s.count/barMax*100}%;background:${STAGE_COLORS[s.stage]}">${s.count}</div></div></div>`});
  h+=`</div><div class="panel"><div class="panel-title">최근 알림</div>`;
  if(!alerts.length)h+=`<div style="color:var(--dim);font-size:13px">알림 없음</div>`;
  else alerts.slice(0,8).forEach(a=>{
    const dotColor=a.type==='shot'?'var(--yellow)':a.type==='delay'?'var(--red)':'var(--orange)';
    h+=`<div class="alert-item" onclick="${a.kind==='repair'?`openRepairDetail(${a.id})`:`openMoldDetail(${a.id})`}"><span class="dot" style="background:${dotColor}"></span><span style="font-size:12px">${a.msg}</span></div>`;
  });
  if(alerts.length>8)h+=`<div style="text-align:center;padding:6px"><a href="#" onclick="switchTab('alerts',document.querySelector('[data-tab=alerts]'));return false" style="color:var(--blue);font-size:12px">전체 ${alerts.length}건 보기 →</a></div>`;
  h+=`</div></div>`;
  document.getElementById("view-dashboard").innerHTML=h;
}

function executeRepairSearch(){
  const moldCode=document.getElementById('rs_mold').value;
  const repType=document.getElementById('rs_type').value;
  const stage=document.getElementById('rs_stage').value;
  const from=document.getElementById('rs_from').value;
  const to=document.getElementById('rs_to').value;
  const keyword=document.getElementById('rs_keyword').value.toLowerCase();

  const results=repairData.filter(r=>{
    if(moldCode&&r.mold_code!==moldCode)return false;
    if(repType&&r.repair_type!==repType)return false;
    if(stage&&r.stage!==stage)return false;
    if(from&&(r.request_date||'')<from)return false;
    if(to&&(r.request_date||'')>to)return false;
    if(keyword&&!((r.reason||'')+(r.description||'')+(r.mold_code||'')).toLowerCase().includes(keyword))return false;
    return true;
  }).sort((a,b)=>(b.request_date||'').localeCompare(a.request_date||''));

  const totalCost=results.reduce((a,b)=>a+(b.cost||0),0);
  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <span style="font-size:14px;font-weight:700">조회 결과: ${results.length}건</span>
    <span style="font-size:12px;color:var(--muted)">총 비용: ${(totalCost/10000).toFixed(0)}만원</span>
  </div>`;

  if(!results.length){
    h+=`<div style="color:var(--dim);text-align:center;padding:30px">조건에 맞는 수리이력이 없습니다.</div>`;
  }else{
    h+=`<div style="overflow-x:auto;border:1px solid var(--border);border-radius:6px;max-height:400px;overflow-y:auto"><table style="font-size:12px"><thead><tr>
      <th>ID</th><th>상태</th><th>금형코드</th><th>품명</th><th>유형</th><th>신청일</th><th>담당자</th><th>수리사유</th><th>비용</th>
    </tr></thead><tbody>`;
    results.forEach((r,i)=>{
      const m=getMold(r.mold_code);
      h+=`<tr class="row" style="background:${i%2?'#f8f9fb':'#fff'}" onclick="openRepairDetail(${r.id})">
        <td>${r.id}</td><td>${badge(r.stage)}</td><td class="code-link">${r.mold_code}</td><td>${m?m.mold_name||'':'-'}</td>
        <td>${r.repair_type||''}</td><td>${r.request_date||''}</td><td>${r.assignee||'-'}</td>
        <td class="ellipsis" style="max-width:250px">${r.reason||''}</td><td style="text-align:right">${r.cost?(r.cost/10000).toFixed(1)+'만':'-'}</td></tr>`;
    });
    h+=`</tbody></table></div>`;
    h+=`<div style="margin-top:10px;text-align:right"><button class="export-btn" onclick="exportSearchResults()">📥 조회결과 엑셀 다운로드</button></div>`;
  }
  document.getElementById('repairSearchResult').innerHTML=h;
  window._lastSearchResults=results;
}

function exportSearchResults(){
  if(!window._lastSearchResults||!window._lastSearchResults.length){alert('조회 결과가 없습니다.');return}
  const rows=window._lastSearchResults.map(r=>{const m=getMold(r.mold_code);return{'금형코드':r.mold_code,'품명':m?m.mold_name:'','상태':r.stage,'수리유형':r.repair_type,'신청일':r.request_date,'의뢰자':r.requester,'담당자':r.assignee,'수리사유':r.reason,'상세설명':r.description,'비용':r.cost,'규격':r.spec,'수리전':r.measure_before,'수리후':r.measure_after}});
  const ws=XLSX.utils.json_to_sheet(rows);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"조회결과");
  XLSX.writeFile(wb,"수리이력_조회결과_"+new Date().toISOString().slice(0,10)+".xlsx");

}

  if(m)h+=`금형그룹: ${m.mold_group||''}<br>고객사: ${m.customer||''}<br>`;
  h+=`수리유형: ${item.repair_type||''}<br>의뢰자: ${item.requester||''}<br>담당자: ${item.assignee||'미배정'}<br>비용: ${item.cost?item.cost.toLocaleString()+'원':'미산정'}</div></div>
  <div><div class="section-title">측정 데이터</div><div class="info-box">`;
  if(item.spec&&item.spec.includes('/')){
    // Multiple measurement items
    const specs=(item.spec||'').split(' / ');
    const befores=(item.measure_before||'').split(' / ');
    const afters=(item.measure_after||'').split(' / ');
    h+=`<table style="width:100%;font-size:12px;margin:4px 0"><thead><tr style="color:var(--muted)"><th style="padding:4px;text-align:left">항목</th><th style="padding:4px">규격</th><th style="padding:4px">수리 전</th><th style="padding:4px">수리 후</th></tr></thead><tbody>`;
    specs.forEach((s,idx)=>{
      h+=`<tr><td style="padding:4px;font-weight:600">${s.split(':')[0]||''}</td><td style="padding:4px;color:var(--blue-light)">${s.split(':')[1]||''}</td><td style="padding:4px;color:var(--red)">${befores[idx]?befores[idx].split(':')[1]||befores[idx]:'-'}</td><td style="padding:4px;color:var(--green)">${afters[idx]?afters[idx].split(':')[1]||afters[idx]:'-'}</td></tr>`;
    });
    h+=`</tbody></table>`;
  } else {
    h+=`규격: <b style="color:var(--blue-light)">${item.spec||'-'}</b><br>
    수리 전: <span style="color:${!item.measure_before?'var(--dim)':'var(--red)'}">${item.measure_before||'-'}</span><br>
    수리 후: <span style="color:${!item.measure_after?'var(--dim)':'var(--green)'}">${item.measure_after||'-'}</span>`;
  }
  // Show judgment if exists
  if(item.description&&(item.description.includes('【측정검증】')||item.description.includes('【정밀측정검증】')||item.description.includes('【확인검증】')||item.description.includes('【생산검증】'))){
    const match=item.description.match(/【정밀측정검증】(.+)/)||item.description.match(/【생산검증】(.+)/)||item.description.match(/【확인검증】(.+)/)||item.description.match(/【측정검증】(.+)/);
    if(match){
      const info=match[1];
      const isOK=info.includes('OK')||(info.includes('합격')&&!info.includes('불합격')&&!info.includes('조건부'));
      const isNG=info.includes('NG')||info.includes('불합격');
      const color=isNG?'var(--red)':isOK?'var(--green)':'var(--orange)';
      const icon=isNG?'❌':isOK?'✅':'⚠️';
      h+=`<div style="margin-top:8px;padding:10px;background:${color}22;border:1px solid ${color};border-radius:4px;font-size:13px;color:${color};font-weight:600">${icon} ${info.split('|').slice(0,3).join(' | ')}</div>`;
      const details=info.split('|').slice(3).map(s=>s.trim()).filter(s=>s);
      if(details.length){
        h+=`<div style="margin-top:6px;padding:8px;background:var(--card);border-radius:4px;font-size:11px;color:var(--muted);line-height:1.8">`;
        details.forEach(d=>{h+=`${d}<br>`});
        h+=`</div>`;
      }
    }
  }
  h+=`</div></div></div>`;
  // 상세설명에서 검증 블록 중복 제거 (최신 1개만 표시)
  const cleanDesc=(desc=>{
    if(!desc)return '';
    const TAG_RE=/【(?:확인검증|측정검증|정밀측정검증|생산검증|간이검증)】[^【]*/g;
    const matches=[...desc.matchAll(TAG_RE)];
    if(matches.length<=1)return desc;
    // 검증 블록이 여러 개면 마지막 것만 남기고 나머지 제거
    const last=matches[matches.length-1][0];
    let cleaned=desc.replace(TAG_RE,'').trim();
    return (cleaned+' '+last).trim();
  })(item.description||'');
  h+=`<div class="section-title">수리사유 / 상세설명</div><div class="info-box"><b>사유:</b> ${item.reason||''}<br><b>설명:</b> ${cleanDesc}</div>`;
  // Photos
  h+=`<div class="section-title">수리 전 / 후 사진</div><div class="photo-compare">
    <div><div style="font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600">📷 수리 전</div>
      <div class="photo-zone">${item.before_img?`<img src="${item.before_img}"><button class="photo-remove" onclick="event.stopPropagation();removeImg(${item.id},'before')">✕</button>`:`<div class="ph-label">클릭하여 사진 첨부</div><div class="ph-hint">JPG, PNG (최대 5MB)</div>`}<input type="file" accept="image/*" onchange="uploadImg(this,${item.id},'before')"></div></div>
    <div><div style="font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:600">📷 수리 후</div>
      <div class="photo-zone">${item.after_img?`<img src="${item.after_img}"><button class="photo-remove" onclick="event.stopPropagation();removeImg(${item.id},'after')">✕</button>`:`<div class="ph-label">클릭하여 사진 첨부</div><div class="ph-hint">JPG, PNG (최대 5MB)</div>`}<input type="file" accept="image/*" onchange="uploadImg(this,${item.id},'after')"></div></div></div>`;
  h+=`<div class="section-title">진행 이력</div><div class="info-box" style="line-height:1.6">`;
  hist.forEach(hi=>{h+=`<div class="history-item"><span class="dot" style="background:${STAGE_COLORS[hi.action]||'#555'}"></span><span style="color:var(--muted);width:90px">${hi.action_date||''}</span>${badge(hi.action)}</div>`});
  if(!hist.length)h+=`<div style="color:var(--dim)">이력 없음</div>`;
  h+=`</div>`;
  // Action buttons
  h+=`<div class="form-actions" style="margin-top:20px"><button class="btn btn-red btn-sm" onclick="deleteRepair(${item.id})">🗑 삭제</button><div style="flex:1"></div><button class="btn btn-secondary" onclick="openEditRepair(${item.id})">✏️ 수정</button></div>`;
  document.getElementById("modalBody").innerHTML=h;document.getElementById("modalOverlay").style.display="flex";
}

// ========== 이미지 압축 (50KB 이하) ==========
function compressImage(file,maxSizeKB=50){
  return new Promise((resolve)=>{
    const reader=new FileReader();
    reader.onload=function(e){
      const img=new Image();
      img.onload=function(){
        const canvas=document.createElement('canvas');
        const ctx=canvas.getContext('2d');
        // Resize: max 800px
        let w=img.width,h=img.height;
        const maxDim=800;
        if(w>maxDim||h>maxDim){
          if(w>h){h=Math.round(h*maxDim/w);w=maxDim}
          else{w=Math.round(w*maxDim/h);h=maxDim}
        }
        canvas.width=w;canvas.height=h;
        ctx.drawImage(img,0,0,w,h);
        // Try decreasing quality until under maxSizeKB
        let quality=0.7;
        let result=canvas.toDataURL('image/jpeg',quality);
        while(result.length>maxSizeKB*1370&&quality>0.05){
          quality-=0.1;
          result=canvas.toDataURL('image/jpeg',Math.max(quality,0.05));
        }
        // If still too big, resize further
        if(result.length>maxSizeKB*1370){
          const scale=Math.sqrt(maxSizeKB*1370/result.length);
          canvas.width=Math.round(w*scale);
          canvas.height=Math.round(h*scale);
          ctx.drawImage(img,0,0,canvas.width,canvas.height);
          result=canvas.toDataURL('image/jpeg',0.5);
        }
        const sizeKB=(result.length*0.73/1024).toFixed(1);
        console.log(`Image compressed: ${(file.size/1024).toFixed(0)}KB → ${sizeKB}KB`);
        resolve(result);
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function uploadImg(input,repairId,type){
  const file=input.files[0];if(!file)return;
  if(file.size>10*1024*1024){alert("10MB 이하만 가능");return}
  toast('사진 압축 중...','info');
  compressImage(file,50).then(async(compressed)=>{
    const updates=type==='before'?{before_img:compressed}:{after_img:compressed};
    await dbUpdateRepair(repairId,updates);
    await dbLoad();openRepairDetail(repairId);
    const sizeKB=(compressed.length*0.73/1024).toFixed(1);
    toast(`사진 저장 완료 (${sizeKB}KB)`,'success');
  });
}

}

async function advanceStage(id,newStage){
  if(newStage==='측정검증'){
    const item=repairData.find(r=>r.id===id);
    const simpleKeywords=['연마','래핑','래핑','교체','교환','조정','라이너','슬라이더','볼트','스프링','밀핀','부시'];
    const reason=((item?.reason||'')+(item?.description||'')).toLowerCase();
    const isSimple=simpleKeywords.some(k=>reason.includes(k))&&!reason.includes('치수')&&!reason.includes('ng')&&!reason.includes('검사');
    if(isSimple){
      openSimpleJudgment(id);
    }else{
      openVerificationChoice(id);
    }
    return;
  }
  const ok=await dbAdvanceStage(id,newStage);
  if(ok){await dbLoad();openRepairDetail(id)}
}

async function saveProductionVerification(repairId,result){
  let inspector=document.getElementById('pv_inspector').value;
  if(inspector==='__custom')inspector=prompt('확인자 이름:')||'';
  const line=document.getElementById('pv_line').value;
  const date=document.getElementById('pv_date').value;
  const qty=document.getElementById('pv_qty').value;
  const okQty=document.getElementById('pv_ok_qty').value;
  const check=document.getElementById('pv_check').value;
  const note=document.getElementById('pv_note').value;

  const item=repairData.find(r=>r.id===repairId);
  const newBlock=`【생산검증】판정: ${result} | 라인: ${line} | 확인자: ${inspector} | 검증일: ${date} | 트라이얼: ${qty||'-'}EA | 양품: ${okQty||'-'}EA | 확인항목: ${check}${note?' | 비고: '+note:''}`;

  await dbUpdateRepair(repairId,{
    description:replaceVerifyBlock(item.description,newBlock),
    spec:result==='OK'?'생산검증 OK':'생산검증 NG'
  });

  if(result==='NG'){
    await dbAdvanceStage(repairId,'측정검증');
    await dbLoad();
    toast('❌ 생산검증 NG - 재수리 필요','error');
    openRepairDetail(repairId);
  }else{
    const ok=await dbAdvanceStage(repairId,'측정검증');
    if(ok){await dbLoad();toast('✅ 생산검증 OK','success');openRepairDetail(repairId)}
  }
}

// 검증 블록 교체 헬퍼 (기존 검증 내용 제거 후 신규 블록으로 대체)
function replaceVerifyBlock(desc,newBlock){
  const cleaned=(desc||'').replace(/\n*【(?:확인검증|측정검증|정밀측정검증|생산검증|간이검증)】[^\n]*/g,'').trimEnd();
  return cleaned+(cleaned?'\n\n':'')+newBlock;
}

  });

function autoJudge(idx){
  const specEl=document.getElementById(`mi_spec_${idx}`);
  const plusEl=document.getElementById(`mi_plus_${idx}`);
  const minusEl=document.getElementById(`mi_minus_${idx}`);
  const afterEl=document.getElementById(`mi_after_${idx}`);
  const judgeEl=document.getElementById(`mi_judge_${idx}`);
  if(!specEl||!afterEl||!judgeEl)return;
  const spec=parseFloat(specEl.value);
  const plus=parseFloat(plusEl?.value)||0;
  const minus=parseFloat(minusEl?.value)||0;
  const after=parseFloat(afterEl.value);
  if(isNaN(spec)||isNaN(after)){judgeEl.textContent='-';judgeEl.style.color='var(--muted)';return}
  const upper=spec+Math.abs(plus);
  const lower=spec-Math.abs(minus);
  if(after>=lower&&after<=upper){
    judgeEl.textContent='✅OK';judgeEl.style.color='var(--green)';
  }else{
    judgeEl.textContent='❌NG';judgeEl.style.color='var(--red)';
  }
}

async function saveMeasurement(repairId){
  let inspector=document.getElementById('mv_inspector').value;
  if(inspector==='__custom')inspector=prompt('검사자 이름:')||'';
  if(!_judgment){alert('종합 판정을 선택해주세요.');return}

  // Collect measurement items
  const items=[];
  for(let i=0;i<_measureRowCount;i++){
    const nameEl=document.getElementById(`mi_name_${i}`);
    if(!nameEl)continue;
    const name=nameEl.value.trim();
    if(!name)continue;
    items.push({
      name:name,
      spec:document.getElementById(`mi_spec_${i}`)?.value||'',
      plus:document.getElementById(`mi_plus_${i}`)?.value||'',
      minus:document.getElementById(`mi_minus_${i}`)?.value||'',
      before:document.getElementById(`mi_before_${i}`)?.value||'',
      after:document.getElementById(`mi_after_${i}`)?.value||''
    });
  }

  const specSummary=items.map(it=>`${it.name}: ${it.spec}${it.plus?'(+'+it.plus+')':''}${it.minus?'('+it.minus+')':''}`).join(' / ');
  const beforeSummary=items.map(it=>`${it.name}: ${it.before}`).join(' / ');
  const afterSummary=items.map(it=>`${it.name}: ${it.after}`).join(' / ');

  const judgmentText=_judgment==='pass'?'합격':_judgment==='fail'?'불합격':'조건부합격';
  const inspDate=document.getElementById('mv_date').value;
  const equip=document.getElementById('mv_equip').value;
  const note=document.getElementById('mv_note').value;
  const purpose=document.getElementById('mv_purpose')?.value||'';
  const method=document.getElementById('mv_method')?.value||'';
  const part=document.getElementById('mv_part')?.value||'';
  const points=document.getElementById('mv_points')?.value||'';

  const item=repairData.find(r=>r.id===repairId);
  const updates={
    spec:specSummary||item.spec||'',
    measure_before:beforeSummary||item.measure_before||'',
    measure_after:afterSummary||item.measure_after||'',
    description:replaceVerifyBlock(item.description||'',`【정밀측정검증】판정: ${judgmentText} | 검사자: ${inspector} | 검사일: ${inspDate} | 장비: ${equip} | 목적: ${purpose} | 방법: ${method} | 부위: ${part} | 포인트: ${points}${note?' | 비고: '+note:''}`)
  };

  await dbUpdateRepair(repairId,updates);
  const ok=await dbAdvanceStage(repairId,'측정검증');
  if(ok){
    await dbLoad();
    toast(`정밀측정검증 완료 (${judgmentText})`,'success');
    openRepairDetail(repairId);
  }
}

let _lastRepairCount=0;

function playNotificationSound(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const osc=ctx.createOscillator();const gain=ctx.createGain();
    osc.connect(gain);gain.connect(ctx.destination);
    osc.frequency.value=880;osc.type='sine';
    gain.gain.setValueAtTime(0.3,ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.5);
    osc.start(ctx.currentTime);osc.stop(ctx.currentTime+0.5);
    // Second beep
    const osc2=ctx.createOscillator();const gain2=ctx.createGain();
    osc2.connect(gain2);gain2.connect(ctx.destination);
    osc2.frequency.value=1100;osc2.type='sine';
    gain2.gain.setValueAtTime(0.3,ctx.currentTime+0.2);
    gain2.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.7);
    osc2.start(ctx.currentTime+0.2);osc2.stop(ctx.currentTime+0.7);
  }catch(e){}
}

      const newItem=payload.new;

      showNotificationBanner(`새 수리의뢰 등록: ${newItem.mold_code} - ${newItem.reason||''}`);
      sendTelegramMessage(`🔔 <b>새 수리의뢰 등록</b>\n\n금형: ${newItem.mold_code}\n사유: ${newItem.reason||'-'}\n의뢰자: ${newItem.requester||'-'}\n📅 ${newItem.request_date||''}`);

    })
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'repair_data'},payload=>{
      const updated=payload.new;
      const old=payload.old;
      if(old.stage!==updated.stage){
        showNotificationBanner(`${updated.mold_code} → ${updated.stage} 단계 변경`);

        sendTelegramMessage(`🔄 <b>수리 단계 변경</b>\n\n금형: ${updated.mold_code}\n${old.stage} → ${updated.stage}\n📅 ${new Date().toLocaleDateString('ko-KR')}`);
      }
      dbLoad();
    })
    .on('postgres_changes',{event:'DELETE',schema:'public',table:'repair_data'},()=>{
      dbLoad();
    })
    .subscribe();

  sb.channel('mold-changes')
    .on('postgres_changes',{event:'*',schema:'public',table:'mold_db'},()=>{dbLoad()})
    .subscribe();
}

function mapColumns(rows,colMap){return rows.map(row=>{const mapped={};Object.keys(row).forEach(key=>{const clean=key.replace(/\s/g,'');const target=colMap[clean]||colMap[key];if(target)mapped[target]=row[key]});return mapped})}

async function handleMoldExcel(input){
  const file=input.files[0];if(!file)return;input.value='';
  const reader=new FileReader();reader.onload=async function(e){
    const wb=XLSX.read(e.target.result,{type:'array',cellDates:true});
    const ws=wb.Sheets[wb.SheetNames[0]];const rows=XLSX.utils.sheet_to_json(ws,{defval:""});
    const mapped=mapColumns(rows,MOLD_COL_MAP).filter(r=>r.mold_code);
    if(!mapped.length){alert("금형코드 컬럼을 찾을 수 없습니다.");return}
    if(!confirm(`${mapped.length}건의 금형 데이터를 업로드하시겠습니까?`))return;
    let cnt=0;
    for(const r of mapped){
      const existing=moldDB.find(m=>m.mold_code===String(r.mold_code));
      if(!existing){
        await sb.from('mold_db').insert({mold_code:String(r.mold_code),mold_group:String(r.mold_group||'200톤'),mold_name:String(r.mold_name||''),mold_no:String(r.mold_no||''),customer:String(r.customer||r.mold_customer||''),product:String(r.product||''),status:String(r.status||'가동중'),shot_count:parseInt(r.shot_count)||0,max_shots:parseInt(r.max_shots)||300000,reg_date:fmtDate(r.reg_date)||new Date().toISOString().slice(0,10),location:String(r.location||''),note:String(r.note||'')});
        cnt++;
      }
    }
    toast(`${cnt}건 등록 완료`,'success');await dbLoad();
  };reader.readAsArrayBuffer(file);
}

// ========== 샷수 업데이트 ==========
const SHOT_COL_MAP={'금형코드':'code','도번':'code','코드':'code','moldCode':'code','mold_code':'code',
  '타발수':'shots','샷수':'shots','현재샷수':'shots','누적샷수':'shots','shot_count':'shots','shotCount':'shots','shots':'shots','타수':'shots','생산수량':'shots',
  '한계수명':'maxShots','최대샷수':'maxShots','max_shots':'maxShots','한계타수':'maxShots'};

async function handleShotUpdate(input){
  const file=input.files[0];if(!file)return;input.value='';
  const reader=new FileReader();
  reader.onload=async function(e){
    const wb=XLSX.read(e.target.result,{type:'array',cellDates:true});

    // Try to parse - could be list format or single-mold MES format
    let updates=[];

    // Check all sheets
    for(const sheetName of wb.SheetNames){
      const ws=wb.Sheets[sheetName];
      const rows=XLSX.utils.sheet_to_json(ws,{defval:""});

      if(rows.length>0){
        // Try list format first (columns: 금형코드, 타발수)
        const mapped=rows.map(row=>{
          const m={};
          Object.keys(row).forEach(key=>{
            const clean=key.replace(/\s/g,'');
            const target=SHOT_COL_MAP[clean]||SHOT_COL_MAP[key];
            if(target)m[target]=row[key];
          });
          return m;
        }).filter(r=>r.code&&r.shots!==undefined&&r.shots!=='');

        if(mapped.length>0){
          updates=updates.concat(mapped);
          continue;
        }
      }

      // Try MES single-mold format (vertical layout)
      const raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
      let code='',shots=0,maxShots=0;
      for(const row of raw){
        if(!row||!Array.isArray(row))continue;
        const rowStr=row.map(c=>String(c||'').trim());
        for(let i=0;i<rowStr.length;i++){
          const cell=rowStr[i];
          // Find mold code
          if(cell==='도번'||cell==='금형코드'){
            for(let j=i+1;j<row.length;j++){
              const v=row[j];
              if(v!==null&&v!==undefined&&String(v).trim()&&String(v).trim()!=='0'){
                code=String(v).trim();break;
              }
            }
          }
          // Find shot count
          if(cell==='타발수'||cell==='샷수'||cell==='누적샷수'||cell==='현재타발수'||cell==='누적타수'){
            for(let j=i+1;j<row.length;j++){
              const v=parseFloat(row[j]);
              if(!isNaN(v)&&v>0){shots=Math.round(v);break;}
            }
          }
          // Find max shots
          if(cell==='한계수명'||cell==='최대샷수'||cell==='한계타수'){
            for(let j=i+1;j<row.length;j++){
              const v=parseFloat(row[j]);
              if(!isNaN(v)&&v>0){maxShots=Math.round(v);break;}
            }
          }
        }
      }
      if(code&&shots>0){
        updates.push({code,shots,maxShots:maxShots||undefined});
      }
    }

    if(!updates.length){
      alert('샷수 데이터를 찾을 수 없습니다.\n\n엑셀에 "금형코드"와 "타발수(또는 샷수)" 컬럼이 필요합니다.\nMES 금형관리 화면에서 추출한 파일도 지원합니다.');
      return;
    }

    // Show preview
    showShotUpdatePreview(updates);
  };
  reader.readAsArrayBuffer(file);
}

function showShotUpdatePreview(updates){
  document.getElementById("modalTitle").textContent="🔄 샷수 업데이트 미리보기";
  let matched=0,notFound=[];
  updates.forEach(u=>{
    const m=moldDB.find(x=>x.mold_code===u.code);
    if(m)matched++;else notFound.push(u.code);
  });

  let h=`<div class="import-summary">
    업데이트 대상: <span class="num">${updates.length}</span>건 &nbsp;|&nbsp;
    DB 매칭: <span style="color:var(--green);font-weight:700">${matched}</span>건 &nbsp;|&nbsp;
    미등록: <span style="color:var(--orange);font-weight:700">${notFound.length}</span>건
  </div>`;

  if(notFound.length){
    h+=`<div class="dup-warn">⚠️ DB에 없는 금형코드: ${notFound.join(', ')}</div>`;
  }

  h+=`<div class="preview-table"><table><thead><tr><th>금형코드</th><th>품명</th><th>현재 샷수</th><th>→</th><th>업데이트 샷수</th><th>변화량</th><th>상태</th></tr></thead><tbody>`;
  updates.forEach(u=>{
    const m=moldDB.find(x=>x.mold_code===u.code);
    const current=m?m.shot_count||0:'-';
    const diff=m?(u.shots-current):'-';
    const pct=m?((u.shots/(m.max_shots||300000))*100).toFixed(0):'-';
    const warn=pct>80;
    h+=`<tr style="${!m?'opacity:.5':''}${warn?';background:#e74c3c11':''}">
      <td class="code-link">${u.code}</td>
      <td>${m?m.mold_name||'':'-'}</td>
      <td style="text-align:right">${typeof current==='number'?current.toLocaleString():current}</td>
      <td style="text-align:center;color:var(--muted)">→</td>
      <td style="text-align:right;font-weight:700;color:var(--blue-light)">${u.shots.toLocaleString()}</td>
      <td style="text-align:right;color:${diff>0?'var(--green)':'var(--muted)'}">${typeof diff==='number'?(diff>0?'+':'')+diff.toLocaleString():diff}</td>
      <td>${!m?'<span style="color:var(--orange)">미등록</span>':warn?'<span style="color:var(--red)">⚠️'+pct+'%</span>':'<span style="color:var(--green)">'+pct+'%</span>'}</td>
    </tr>`;
  });
  h+=`</tbody></table></div>`;

  h+=`<div class="form-actions">
    <button class="btn btn-secondary" onclick="closeModal()">취소</button>
    <button class="export-btn" onclick="downloadShotTemplate()">📋 샷수 양식 다운로드</button>
    <button class="btn" style="background:var(--orange)" onclick="executeShotUpdate(${JSON.stringify(updates).replace(/"/g,'&quot;')})">🔄 ${matched}건 업데이트 실행</button>
  </div>`;

  document.getElementById("modalBody").innerHTML=h;
  document.getElementById("modalOverlay").style.display="flex";
}

async function executeShotUpdate(updates){
  let cnt=0,added=0;
  for(const u of updates){
    let m=moldDB.find(x=>x.mold_code===u.code);
    if(!m){
      // Auto-register unknown mold
      const{data}=await sb.from('mold_db').insert({mold_code:u.code,mold_group:'',mold_name:'',mold_no:'',customer:'',product:'',status:'가동중',shot_count:u.shots,max_shots:u.maxShots||300000,location:'',note:'샷수 업데이트 시 자동등록'}).select();
      if(data&&data[0]){added++;cnt++}
      continue;
    }
    const upd={shot_count:u.shots};
    if(u.maxShots)upd.max_shots=u.maxShots;
    const{error}=await sb.from('mold_db').update(upd).eq('id',m.id);
    if(!error)cnt++;
  }
  closeModal();
  await dbLoad();
  toast(`🔄 ${cnt}건 업데이트 완료${added?' (신규 '+added+'건 자동등록)':''}`,'success');
}

function renderStats(stats){
  const colors=["var(--blue)","var(--orange)","var(--purple)","var(--green)","var(--red)","var(--yellow)"];
  const topMax=stats.topMolds.length?stats.topMolds[0][1]:1;const typeMax=stats.byType.length?stats.byType[0][1]:1;
  let h=`<div class="grid-2">`;
  h+=`<div class="panel"><div class="panel-title">금형별 수리횟수 (Top 5)</div>`;
  stats.topMolds.forEach(([code,cnt])=>{h+=`<div class="bar-row"><span class="bar-label" style="width:100px;color:var(--blue-light);font-weight:600">${code}</span><div class="bar-track"><div class="bar-fill" style="width:${cnt/topMax*100}%;background:linear-gradient(90deg,#2980b9,#3498db);justify-content:flex-end;padding-right:8px">${cnt}</div></div></div>`});
  if(!stats.topMolds.length)h+=`<div style="color:var(--dim)">데이터 없음</div>`;
  h+=`</div><div class="panel"><div class="panel-title">수리유형별 분포</div>`;
  stats.byType.forEach(([type,cnt],i)=>{h+=`<div class="bar-row"><span class="bar-label">${type}</span><div class="bar-track"><div class="bar-fill" style="width:${cnt/typeMax*100}%;background:${colors[i%colors.length]};justify-content:flex-end;padding-right:8px">${cnt}</div></div></div>`});
  if(!stats.byType.length)h+=`<div style="color:var(--dim)">데이터 없음</div>`;
  h+=`</div><div class="panel"><div class="panel-title">월별 수리 추이</div>`;
  const monthCounts={};
  repairData.forEach(r=>{const ym=(r.request_date||'').slice(0,7);if(ym)monthCounts[ym]=(monthCounts[ym]||0)+1});
  const months=Object.entries(monthCounts).sort((a,b)=>b[0].localeCompare(a[0])).slice(0,12).reverse();
  const monthMax=Math.max(...months.map(m=>m[1]),1);
  months.forEach(([ym,cnt])=>{h+=`<div class="bar-row"><span class="bar-label" style="width:70px;font-size:11px">${ym}</span><div class="bar-track"><div class="bar-fill" style="width:${cnt/monthMax*100}%;background:var(--teal);justify-content:flex-end;padding-right:8px">${cnt}</div></div></div>`});
  if(!months.length)h+=`<div style="color:var(--dim)">데이터 없음</div>`;
  h+=`</div><div class="panel"><div class="panel-title">비용 분석</div><div class="stat-line">`;
  h+=`총 수리비용: <b>${(stats.totalCost/10000).toFixed(0)}만원</b><br>건당 평균: <b>${stats.total?(stats.totalCost/stats.total/10000).toFixed(1):0}만원</b><br>`;
  const sorted=[...repairData].sort((a,b)=>(b.cost||0)-(a.cost||0));
  if(sorted[0]&&sorted[0].cost)h+=`최고 비용: <b style="color:var(--red)">${sorted[0].mold_code} (${(sorted[0].cost/10000).toFixed(1)}만원)</b>`;
  h+=`</div></div></div>`;
  document.getElementById("view-stats").innerHTML=h;
}

    h+=`</div>`;
  }

  if(repairAlerts.length){
    h+=`<div class="panel" style="margin-bottom:16px;border-left:3px solid var(--orange)"><div class="panel-title">🔧 수리 진행중 (입고완료 전)</div>`;
    // Group by stage
    STAGES.forEach(stage=>{
      if(stage==='입고완료')return;
      const stageItems=repairAlerts.filter(a=>a.stage===stage);
      if(!stageItems.length)return;
      h+=`<div style="font-size:12px;font-weight:700;color:${STAGE_COLORS[stage]};margin:10px 0 6px;padding-left:4px">${stage} (${stageItems.length}건)</div>`;
      stageItems.forEach(a=>{h+=`<div class="alert-card repair" onclick="openRepairDetail(${a.id})">${a.msg}<span class="alert-arrow">→</span></div>`});
    });
    h+=`</div>`;
  }

  if(!alerts.length) h+=`<div class="panel"><div style="color:var(--dim);text-align:center;padding:40px 0">✅ 알림이 없습니다.</div></div>`;

  document.getElementById("view-alerts").innerHTML=h;
}

let telegramConfig={botToken:'',recipients:[]};

async function loadTelegramConfig(){
  const{data}=await sb.from('settings').select('items').eq('category','telegram').maybeSingle();
  if(data&&data.items)telegramConfig=data.items;
}
async function saveTelegramConfig(){
  await sb.from('settings').upsert({category:'telegram',name:'텔레그램',description:'텔레그램 알림 설정',items:telegramConfig},{onConflict:'category'});
}

async function sendTelegramMessage(text){
  if(!telegramConfig.botToken||!telegramConfig.recipients||!telegramConfig.recipients.length)return;
  for(const r of telegramConfig.recipients){
    try{
      await fetch(`https://api.telegram.org/bot${telegramConfig.botToken}/sendMessage`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({chat_id:r.chatId,text:text,parse_mode:'HTML'})
      });
    }catch(e){console.error('Telegram send error:',e)}
  }
}

function maskString(str){
  if(!str)return '';
  if(str.length<=8)return '••••••••';
  return str.slice(0,4)+'•'.repeat(Math.min(str.length-8,30))+str.slice(-4);
}

function historySearch(){
  const from=document.getElementById('hist_from').value;
  const to=document.getElementById('hist_to').value;
  const type=document.getElementById('hist_type').value;
  const process=document.getElementById('hist_process').value;

  let results=[];
  if(type==='repair'){
    results=repairData.filter(r=>{
      if(from&&(r.request_date||'')<from)return false;
      if(to&&(r.request_date||'')>to)return false;
      if(process&&r.stage!==process)return false;
      return true;
    }).sort((a,b)=>(b.request_date||'').localeCompare(a.request_date||''));
  }else if(type==='mold'){
    results=moldDB;
  }

  if(type==='repair'){
    let rh=`<div style="font-size:13px;font-weight:600;margin-bottom:8px">조회결과: ${results.length}건</div>`;
    rh+=`<div style="overflow-x:auto;max-height:300px;border:1px solid var(--border);border-radius:6px"><table style="font-size:12px"><thead><tr><th>ID</th><th>상태</th><th>금형</th><th>유형</th><th>신청일</th><th>사유</th><th>비용</th></tr></thead><tbody>`;
    results.slice(0,100).forEach((r,i)=>{rh+=`<tr class="row" style="background:${i%2?'#f8f9fb':''}" onclick="openRepairDetail(${r.id})"><td>${r.id}</td><td>${badge(r.stage)}</td><td class="code-link">${r.mold_code}</td><td>${r.repair_type||''}</td><td>${r.request_date||''}</td><td class="ellipsis">${r.reason||''}</td><td style="text-align:right">${r.cost?(r.cost/10000).toFixed(1)+'만':'-'}</td></tr>`});
    rh+=`</tbody></table></div>`;
    document.getElementById('historyResult').innerHTML=rh;
  }else{
    let mh=`<div style="font-size:13px;font-weight:600;margin-bottom:8px">금형현황: ${results.length}종</div>`;
    mh+=`<div style="overflow-x:auto;max-height:300px;border:1px solid var(--border);border-radius:6px"><table style="font-size:12px"><thead><tr><th>금형코드</th><th>상태</th><th>그룹</th><th>품명</th><th>고객사</th><th>위치</th><th>최종수리</th></tr></thead><tbody>`;
    results.forEach((m,i)=>{mh+=`<tr class="row" style="background:${i%2?'#f8f9fb':''}" onclick="openMoldDetail(${m.id})"><td class="code-link">${m.mold_code}</td><td>${statusBadge(m.status||'')}</td><td>${m.mold_group||''}</td><td>${m.mold_name||''}</td><td>${m.customer||''}</td><td>${m.location||''}</td><td>${m.last_repair||'-'}</td></tr>`});
    mh+=`</tbody></table></div>`;
    document.getElementById('historyResult').innerHTML=mh;
  }
}

function historyExcel(){
  const from=document.getElementById('hist_from').value;
  const to=document.getElementById('hist_to').value;
  const type=document.getElementById('hist_type').value;
  const process=document.getElementById('hist_process').value;

  if(type==='repair'){
    const results=repairData.filter(r=>{
      if(from&&(r.request_date||'')<from)return false;
      if(to&&(r.request_date||'')>to)return false;
      if(process&&r.stage!==process)return false;
      return true;
    });
    const rows=results.map(r=>{const m=getMold(r.mold_code);return{'금형코드':r.mold_code,'품명':m?m.mold_name:'','상태':r.stage,'유형':r.repair_type,'신청일':r.request_date,'의뢰자':r.requester,'담당자':r.assignee,'사유':r.reason,'설명':r.description,'비용':r.cost}});
    const ws=XLSX.utils.json_to_sheet(rows);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"수리이력");
    XLSX.writeFile(wb,`수리이력_${from}_${to}.xlsx`);
  }else if(type==='mold'){
    const rows=moldDB.map(m=>({'금형코드':m.mold_code,'그룹':m.mold_group,'품명':m.mold_name,'품번':m.mold_no,'고객사':m.customer,'제품명':m.product,'상태':m.status,'위치':m.location,'등록일':m.reg_date,'최종수리':m.last_repair}));
    const ws=XLSX.utils.json_to_sheet(rows);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"금형현황");
    XLSX.writeFile(wb,`금형현황_${new Date().toISOString().slice(0,10)}.xlsx`);
  }
  toast('엑셀 다운로드 완료','info');
}

async function historyDeleteRange(){
  const from=document.getElementById('hist_from').value;
  const to=document.getElementById('hist_to').value;
  const type=document.getElementById('hist_type').value;
  if(type!=='repair'){alert('수리이력만 삭제 가능합니다.');return}
  const targets=repairData.filter(r=>{
    if(from&&(r.request_date||'')<from)return false;
    if(to&&(r.request_date||'')>to)return false;
    return true;
  });
  if(!targets.length){alert('삭제할 데이터가 없습니다.');return}
  if(!confirm(`${from} ~ ${to} 기간의 수리이력 ${targets.length}건을 삭제하시겠습니까?\n\n⚠️ 이 작업은 되돌릴 수 없습니다.`))return;
  for(const r of targets){
    await sb.from('repair_history').delete().eq('repair_id',r.id);
    await sb.from('repair_data').delete().eq('id',r.id);
  }
  toast(`${targets.length}건 삭제 완료`,'success');
  await dbLoad();renderSettings();
}

function addTgRecipient(){
  const name=document.getElementById('tg_new_name').value.trim();
  const chatId=document.getElementById('tg_new_chat').value.trim();
  if(!name||!chatId){alert('이름과 Chat ID를 모두 입력해주세요.');return}
  if(!telegramConfig.recipients)telegramConfig.recipients=[];
  telegramConfig.recipients.push({name,chatId});
  document.getElementById('tg_new_name').value='';
  document.getElementById('tg_new_chat').value='';
  renderSettings();
  toast(`${name} 추가됨`,'success');
}

function removeTgRecipient(idx){
  const name=telegramConfig.recipients[idx]?.name||'';
  telegramConfig.recipients.splice(idx,1);
  renderSettings();
  toast(`${name} 삭제됨`,'info');
}

async function saveTelegramSettings(){
  telegramConfig.botToken=document.getElementById('tg_token').value.trim();
  // Update recipient names/chatIds from inputs
  const newRecipients=[];
  for(let i=0;i<(telegramConfig.recipients||[]).length;i++){
    const nameEl=document.getElementById(`tg_rname_${i}`);
    const chatEl=document.getElementById(`tg_rchat_${i}`);
    if(nameEl&&chatEl){
      newRecipients.push({name:nameEl.value.trim(),chatId:chatEl.value.trim()});
    }
  }
  telegramConfig.recipients=newRecipients;
  await saveTelegramConfig();
  toast('텔레그램 설정 저장 완료','success');
}

async function testTelegram(){
  telegramConfig.botToken=document.getElementById('tg_token').value.trim();
  if(!telegramConfig.botToken){alert('Bot Token을 입력해주세요.');return}
  if(!telegramConfig.recipients||!telegramConfig.recipients.length){alert('수신자를 추가해주세요.');return}
  document.getElementById('tg_status').innerHTML='<span style="color:var(--orange)">⏳ 발송 중...</span>';
  try{
    const text='🔔 <b>금형 수리관리 시스템</b>\n\n테스트 메시지입니다.\n텔레그램 알림이 정상 작동합니다.\n\n📅 '+new Date().toLocaleString('ko-KR');
    let success=0;
    for(const r of telegramConfig.recipients){
      const res=await fetch(`https://api.telegram.org/bot${telegramConfig.botToken}/sendMessage`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({chat_id:r.chatId,text:text,parse_mode:'HTML'})
      });
      const json=await res.json();
      if(json.ok)success++;
    }
    document.getElementById('tg_status').innerHTML=`<span style="color:var(--green)">✅ ${success}/${telegramConfig.recipients.length}명 발송 성공!</span>`;
  }catch(e){
    document.getElementById('tg_status').innerHTML=`<span style="color:var(--red)">❌ 발송 실패: ${e.message||e}</span>`;
  }
}

async function addSetting(key){
  const name=prompt(`새 ${settingsData[key].name} 항목:`);
  if(!name||!name.trim())return;
  if(settingsData[key].items.includes(name.trim())){alert('이미 존재');return}
  settingsData[key].items.push(name.trim());
  await saveSetting(key);renderSettings();toast('항목 추가됨','success');
}

async function editSetting(key,idx){
  const old=settingsData[key].items[idx];
  const val=prompt('수정:',old);
  if(!val||!val.trim()||val.trim()===old)return;
  settingsData[key].items[idx]=val.trim();
  await saveSetting(key);renderSettings();toast('수정 완료','success');
}

async function deleteSetting(key,idx){
  if(!confirm(`"${settingsData[key].items[idx]}" 삭제하시겠습니까?`))return;
  settingsData[key].items.splice(idx,1);
  await saveSetting(key);renderSettings();toast('삭제 완료','success');
}

async function moveSetting(key,idx,dir){
  const arr=settingsData[key].items;const ni=idx+dir;
  if(ni<0||ni>=arr.length)return;
  [arr[idx],arr[ni]]=[arr[ni],arr[idx]];
  await saveSetting(key);renderSettings();
}

async function seedDatabase(){
  toast('초기 데이터 등록 중... (금형 64종 + 수리 301건)','info');
  document.getElementById('dbStatus').textContent='⏳ 데이터 등록중...';
  document.getElementById('dbStatus').className='db-status db-loading';
  try{
    // Insert molds
    const{error:me}=await sb.from('mold_db').insert(SEED_MOLDS.map(m=>({
      mold_code:m.mold_code,mold_group:m.mold_group,mold_name:m.mold_name,mold_no:m.mold_no,
      customer:m.customer,product:m.product,status:m.status,
      shot_count:m.shot_count,max_shots:m.max_shots,location:m.location,note:m.note
    })));
    if(me)throw me;
    // Insert repairs in batches of 50
    for(let i=0;i<SEED_REPAIRS.length;i+=50){
      const batch=SEED_REPAIRS.slice(i,i+50).map(r=>({
        mold_code:r.mold_code,stage:r.stage,request_date:r.request_date||null,
        requester:r.requester,assignee:r.assignee,repair_type:r.repair_type,
        reason:r.reason,description:r.description,cost:r.cost,
        spec:r.spec,measure_before:r.measure_before,measure_after:r.measure_after
      }));
      const{data:inserted,error:re}=await sb.from('repair_data').insert(batch).select('id');
      if(re)throw re;
      // Add history for each
      if(inserted){
        const histBatch=inserted.map((row,idx)=>({
          repair_id:row.id,
          action:'입고완료',
          action_date:SEED_REPAIRS[i+idx].request_date||null
        }));
        await sb.from('repair_history').insert(histBatch);
      }
    }
    // Update last_repair dates on molds
    const{data:allRepairs}=await sb.from('repair_data').select('mold_code,request_date').order('request_date',{ascending:false});
    if(allRepairs){
      const lastDates={};
      allRepairs.forEach(r=>{if(!lastDates[r.mold_code])lastDates[r.mold_code]=r.request_date});
      for(const[code,date]of Object.entries(lastDates)){
        await sb.from('mold_db').update({last_repair:date}).eq('mold_code',code);
      }
    }
    toast('초기 데이터 등록 완료! (금형 64종 + 수리 301건)','success');
  }catch(err){
    console.error('Seed error:',err);
    toast('데이터 등록 실패: '+err.message,'error');
  }
  await dbLoad();
}

// Auto-seed if DB is empty
async function initApp(){
  await dbLoad();
  // Settings version sync: force-update DB settings when HTML version changes
  const{data:verData}=await sb.from('settings').select('items').eq('category','_version').maybeSingle();
  const dbVer=(verData?.items)?verData.items[0]||'':'';
  if(dbVer!==SETTINGS_VERSION){
    toast('설정 동기화 중...','info');
    settingsData=JSON.parse(JSON.stringify(DEFAULT_SETTINGS));
    await saveAllSettings();
    await sb.from('settings').upsert({category:'_version',name:'버전',description:'설정 버전',items:[SETTINGS_VERSION]},{onConflict:'category'});
    toast('설정 동기화 완료','success');
  }
  if(moldDB.length===0 && repairData.length===0){
    await seedDatabase();
  } else {
    const missing=SEED_MOLDS.filter(sm=>!moldDB.some(m=>m.mold_code===sm.mold_code));
    if(missing.length){
      toast(`신규 금형 ${missing.length}건 추가 중...`,'info');
      await sb.from('mold_db').insert(missing.map(m=>({
        mold_code:m.mold_code,mold_group:m.mold_group,mold_name:m.mold_name,mold_no:m.mold_no,
        customer:m.customer,product:m.product,status:m.status,
        shot_count:m.shot_count,max_shots:m.max_shots,location:m.location,note:m.note
      })));
      toast(`신규 금형 ${missing.length}건 등록 완료`,'success');
    }
    const toUpdate=SEED_MOLDS.filter(sm=>sm.shot_count>0);
    for(const sm of toUpdate){
      const existing=moldDB.find(m=>m.mold_code===sm.mold_code);
      if(existing&&(existing.shot_count||0)!==sm.shot_count){
        await sb.from('mold_db').update({shot_count:sm.shot_count}).eq('mold_code',sm.mold_code);
      }
    }
    if(missing.length||toUpdate.length) await dbLoad();
  }
  await loadTelegramConfig();
  setupRealtime();
}
initApp();
</script>
